.controls { display:flex; flex-wrap:wrap; gap:10px 14px; align-items:center; padding:14px 20px; background:var(--panel); border-bottom:1px solid var(--border); }
select,input[type=range] { background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px 10px; font:inherit; }
.btn { padding:8px 14px; border-radius:8px; border:none; cursor:pointer; font:600 .88rem 'Outfit',sans-serif; }
.btn-play { background:var(--accent); color:#00111f; }
.btn-play.playing { background:#f87171; color:#190404; }
.btn-sec { background:var(--card); color:var(--text); border:1px solid var(--border); }

.filter-box label { display:flex; align-items:center; gap:5px; font-size:.82rem; white-space:nowrap; }
.filter-box select { padding:5px 8px; font-size:.82rem; }
.filter-title { color:var(--text2); font-size:.76rem; text-transform:uppercase; letter-spacing:.05em; }
.hud { display:flex; align-items:center; gap:16px; padding:12px 20px; background:var(--panel); border-bottom:1px solid var(--border); font-family:'JetBrains Mono',monospace; }
.hud-clock { min-width:160px; font-size:1.6rem; font-weight:700; color:var(--accent); }
.hud-dist { color:var(--text2); font-size:.88rem; }
.hud-dist span { color:var(--text); font-weight:600; }
.hud-progress-wrap { flex:1; height:7px; background:var(--card); border-radius:999px; overflow:hidden; cursor:pointer; position:relative; }
.hud-progress { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
.hud-progress-wrap .markers { position:absolute; inset:0; }
.hud-progress-wrap .marker { position:absolute; top:-2px; width:1px; height:11px; background:rgba(255,255,255,.14); }
.pool-area { padding:16px 20px 28px; }
.dist-markers { position:relative; margin-left:30px; margin-right:200px; height:22px; }
.dist-marker { position:absolute; top:0; transform:translateX(-50%); color:var(--text2); font:.7rem 'JetBrains Mono',monospace; }
.pool { position:relative; border:1px solid var(--border); border-radius:14px; overflow:hidden; background:
  linear-gradient(180deg,#081527 0%,#0a1a30 100%),

.lane-slot { position:relative; height:44px; border-bottom:1px solid rgba(56,189,248,.08); }
.lane-slot:nth-child(even) { background:rgba(255,255,255,.01); }
.slot-pos { position:absolute; left:6px; top:50%; transform:translateY(-50%); width:20px; text-align:center; color:var(--text2); font:700 .72rem 'JetBrains Mono',monospace; }
.swimmer-group { position:absolute; left:0; width:100%; height:44px; pointer-events:none; }
.swimmer-label { position:absolute; right:4px; top:50%; transform:translateY(-50%); display:flex; align-items:center; gap:5px; white-space:nowrap; overflow:hidden; font-size:.72rem; background:rgba(6,12,22,.8); padding:2px 8px; border-radius:6px; max-width:200px; }
.swimmer-label .sname { font-weight:600; overflow:hidden; text-overflow:ellipsis; }

.swimmer-label .club { color:var(--text2); font-size:.58rem; overflow:hidden; text-overflow:ellipsis; }

.trail-canvas, .waypoint-hover-line { position:absolute; inset:0; pointer-events:none; }
.waypoint-hover-line { width:2px; left:0; background:rgba(255,255,255,.16); display:none; }

.lb-header { display:flex; align-items:center; gap:8px; padding:8px 10px; border-bottom:1px solid var(--border); background:rgba(255,255,255,.02); cursor:grab; }
.lb-header:active { cursor:grabbing; }
.lb-grip { color:var(--text2); letter-spacing:2px; }
.lb-title { flex:1; color:var(--text2); font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; }
.lb-close { cursor:pointer; color:var(--text2); font-size:1rem; line-height:1; }
.lb-body { padding:8px 10px; max-height:360px; overflow:auto; }
.lb-row { display:flex; align-items:center; gap:8px; padding:3px 0; font-size:.76rem; }
.lb-pos { width:22px; text-align:right; font:700 .74rem 'JetBrains Mono',monospace; }
.lb-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lb-gap, .lb-time { font:.64rem 'JetBrains Mono',monospace; color:var(--text2); }
.lb-gap { min-width:56px; text-align:right; color:#f87171; }
.partial-tooltip { position:absolute; top:10px; left:10px; min-width:270px; max-width:340px; padding:10px 12px; background:rgba(9,18,31,.96); border:1px solid var(--border); border-radius:12px; box-shadow:0 14px 32px rgba(0,0,0,.35); display:none; z-index:500; }

.tt-title { color:var(--text); font-weight:700; }
.tt-row { display:grid; grid-template-columns:1fr auto auto auto; gap:8px; align-items:center; padding:3px 0; font-size:.76rem; }
.tt-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  if (!ev.hasFinalA && !ev.hasFinalB && ev.hasElim && !chkElimAll.checked && !selElimSerie.value) chkElimAll.checked = true;
}
function getFilteredEntries(ev) {
  const catFilter = selCategoria.value;
  let rows = ev.entries.filter(row => {
    if (catFilter && (row.cat || '') !== catFilter) return false;
    if (row.ft === 'A') return chkFinalA.checked;
    if (row.ft === 'B') return chkFinalB.checked;
    if (row.phaseNorm === 'ELIM') {
      if (selElimSerie.value) return String(row.sr || '') === selElimSerie.value;
      return chkElimAll.checked;
    }
    return true;
  });
  if (!rows.length && ev.hasElim && !chkElimAll.checked && !selElimSerie.value && !chkFinalA.checked && !chkFinalB.checked) {
    chkElimAll.checked = true;
    rows = ev.entries.filter(row => {
      if (catFilter && (row.cat || '') !== catFilter) return false;
      return row.phaseNorm === 'ELIM';
    });
  }
  return rows;
}
function setupRace(resetFilters=false) {
  stop();
  state.elapsed = 0; state.lastTs = null; state.hoveredWaypoint = null;
  const ev = EVENTS[selEv.value];
  if (!ev) return;
  if (resetFilters) {
    chkFinalA.checked = ev.hasFinalA;
    chkFinalB.checked = ev.hasFinalB;
    chkElimAll.checked = false;
    selElimSerie.value = '';
  }
  applyFilterDefaults(ev);
  let rows = getFilteredEntries(ev);
  if (!rows.length) rows = ev.entries.slice();
  rows.sort((a, b) => (timeToSec(a.t) || 99999) - (timeToSec(b.t) || 99999));
  const limit = parseInt(selLimit.value, 10) || 10;
  const sliced = rows.slice(0, limit);
  const athletes = sliced.map((a, i) => {
    const wps = Object.entries(a.pa).map(([dist, t]) => ({dist:Number(dist), t:timeToSec(t)})).filter(w => w.t != null).sort((x,y) => x.dist - y.dist);
    const distMap = {}, splitMap = {};
    Object.entries(a.pa).forEach(([dist, t]) => { const v = timeToSec(t); if (v != null) distMap[Number(dist)] = v; });
    Object.entries(a.sp || {}).forEach(([dist, t]) => { const v = timeToSec(t); if (v != null) splitMap[Number(dist)] = v; });
    return { ...a, color: COLORS[i % COLORS.length], wps, segments: buildSegments(wps), distMap, splitMap, tag: a.tag || makeTag(a) };
  }).filter(a => a.wps.length >= 2);
  const allWaypoints = Array.from(new Set(athletes.flatMap(a => a.wps.map(w => w.dist)))).sort((a,b) => a-b);
  const rankMaps = computeWaypointRanks(athletes, allWaypoints);
  athletes.forEach((a, idx) => a.rankAt = rankMaps[idx]);
  state.athletes = athletes;
  state.totalDist = ev.dist || Math.max(...athletes.flatMap(a => a.wps.map(w => w.dist)), 0);
  state.totalTime = Math.max(0, ...athletes.map(a => a.wps[a.wps.length - 1]?.t || 0));
  state.waypoints = allWaypoints;
  state.LANE_H = window.innerWidth < 768 ? 36 : 44;
  buildPoolDOM();
  render();
}
function buildPoolDOM() {
  const pool = document.getElementById('pool');
  const distMarkers = document.getElementById('dist-markers');
  const hudMarkers = document.getElementById('hud-markers');
  pool.innerHTML = '<div class="waypoint-hover-line" id="waypoint-hover-line"></div><div class="partial-tooltip" id="partial-tooltip"></div>';
  for (let i = 0; i < state.athletes.length; i++) {
    const slot = document.createElement('div');
    slot.className = 'lane-slot';
    slot.innerHTML = `<div class="slot-pos">${i+1}°</div>`;
    pool.appendChild(slot);
  }
  const canvas = document.createElement('canvas');
  canvas.className = 'trail-canvas';
  canvas.id = 'trail-canvas';
  pool.appendChild(canvas);
  state.athletes.forEach((a, i) => {
    const grp = document.createElement('div');
    grp.className = 'swimmer-group';
    grp.id = 'sg-' + i;
    grp.innerHTML = `
      <div class="swimmer-capsule" id="sd-${i}" style="background:${a.color};color:${a.color};left:30px;">
        <span class="initials">${getInitials(a.n)}</span>
      </div>
      <div class="gap-tag" id="gt-${i}"></div>
      <div class="swimmer-label">
        <span class="sname" style="color:${a.color}">${shortName(a.n)}</span>
        <span class="tag">${a.tag}</span>
        <span class="club">${a.e}</span>
      </div>`;
    pool.appendChild(grp);
  });
  distMarkers.innerHTML = `<div class="dist-marker" style="left:0%;">0m</div>` + state.waypoints.map(d => `<div class="dist-marker" style="left:${(d / state.totalDist) * 100}%;">${d}m</div>`).join('');
  hudMarkers.innerHTML = state.waypoints.map(d => `<div class="marker" style="left:${(d / state.totalDist) * 100}%;"></div>`).join('');
  sizeTrailCanvas();
}
function sizeTrailCanvas() {
  const canvas = document.getElementById('trail-canvas');
  const pool = document.getElementById('pool');
  if (!canvas || !pool) return;
  canvas.width = pool.clientWidth;
  canvas.height = pool.clientHeight;
}
function clearTrail() {
  const canvas = document.getElementById('trail-canvas');
  if (!canvas) return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
}
function drawTrailSegment(ctx, x1, y1, x2, y2, color) {
  ctx.strokeStyle = color;
  ctx.globalAlpha = 0.65;
  ctx.lineWidth = 2.4;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.globalAlpha = 1;
}
function rebuildTrail() {
  clearTrail();
  if (!state.trailEnabled || !state.athletes.length) return;
  const canvas = document.getElementById('trail-canvas');
  const ctx = canvas.getContext('2d');
  const poolW = canvas.width, labelW = 30, rightPad = 200, trackW = poolW - labelW - rightPad;
  const prev = state.athletes.map(a => { const p0 = getPosition(a, 0); return { x: labelW, y: p0.rankFloat * state.LANE_H + state.LANE_H / 2 }; });
  const dt = Math.max(state.totalTime / 320, 0.02);
  for (let t = dt; t <= state.elapsed + 1e-9; t += dt) {
    state.athletes.forEach((a, idx) => {
      const p = getPosition(a, Math.min(t, state.elapsed));
      const x = labelW + Math.min(p.dist / state.totalDist, 1) * trackW;
      const y = p.rankFloat * state.LANE_H + state.LANE_H / 2;
      drawTrailSegment(ctx, prev[idx].x, prev[idx].y, x, y, a.color);
      prev[idx] = {x, y};
    });
  }
}
function render() {
  const pool = document.getElementById('pool');
  if (!pool || !state.athletes.length) {
    const lbBody = document.getElementById('lb-body');
    if (lbBody) lbBody.innerHTML = '<div class="empty-state">Sem atletas neste filtro.</div>';
    return;
  }
  const poolWidth = pool.clientWidth, labelW = 30, rightPad = 200, trackW = poolWidth - labelW - rightPad;
  const positions = state.athletes.map((a, idx) => {
    const pos = getPosition(a, state.elapsed);
    return { idx, dist:pos.dist, time:pos.time, finished:!!pos.finished, rankFloat:pos.rankFloat, name:a.n, color:a.color, club:a.e };
  });
  clearTrail();
  if (state.trailEnabled) {
    const canvas = document.getElementById('trail-canvas');
    const ctx = canvas.getContext('2d');
    const prev = state.athletes.map(a => { const p0 = getPosition(a, 0); return {x:labelW, y:p0.rankFloat * state.LANE_H + state.LANE_H / 2}; });
    const dt = Math.max(state.totalTime / 260, 0.02);
    for (let t = dt; t <= state.elapsed + 1e-9; t += dt) {
      state.athletes.forEach((a, idx) => {
        const p = getPosition(a, Math.min(t, state.elapsed));
        const x = labelW + Math.min(p.dist / state.totalDist, 1) * trackW;
        const y = p.rankFloat * state.LANE_H + state.LANE_H / 2;
        drawTrailSegment(ctx, prev[idx].x, prev[idx].y, x, y, a.color);
        prev[idx] = {x, y};
      });
    }
  }
  // Gap tag: estimate time gap behind leader using distance difference and leader speed
  // Gap: find leader (most distance covered)
  const leaderPos = positions.reduce((best, p) => (p.dist > best.dist || (p.dist === best.dist && p.time < best.time)) ? p : best, positions[0]);
  const leaderFinished = leaderPos.finished;
  const leaderFinishTime = leaderFinished ? leaderPos.time : 0;
  const leaderSpeed = leaderPos && state.elapsed > 0.5 ? leaderPos.dist / state.elapsed : 0;
  state.athletes.forEach((a, idx) => {
    const grp = document.getElementById('sg-' + idx);
    const dot = document.getElementById('sd-' + idx);
    const gtag = document.getElementById('gt-' + idx);
    const p = positions[idx];
    const x = labelW + Math.min(p.dist / state.totalDist, 1) * trackW;
    const y = p.rankFloat * state.LANE_H + state.LANE_H / 2;
    grp.style.top = `${y - state.LANE_H / 2}px`;
    dot.style.left = `${x}px`;
    const lbl = grp.querySelector('.swimmer-label');
    if (lbl) { lbl.style.right = '4px'; lbl.style.left = 'auto'; lbl.style.opacity = (!p.finished && x > (poolWidth - rightPad - 30)) ? '0.3' : '1'; }
    // Gap calculation
    let timeGap = 0;
    const isLeader = (idx === leaderPos.idx);
    if (!isLeader && state.elapsed > 1) {
      if (p.finished && leaderFinished) {
        // Both finished: exact time difference
        timeGap = p.time - leaderFinishTime;
      } else if (leaderFinished && !p.finished) {
        // Leader done, this one still swimming: elapsed - leader finish time
        timeGap = state.elapsed - leaderFinishTime;
      } else if (leaderSpeed > 0) {
        // Both swimming: distance-based estimate
        const distGap = leaderPos.dist - p.dist;
        if (distGap > 0.5) timeGap = distGap / leaderSpeed;
      }
    }
    if (timeGap > 0.05) {
      const prevGap = parseFloat(gtag.dataset.prev || '0');
      let color = 'rgba(255,255,255,.55)';
      if (prevGap > 0.1 && timeGap < prevGap - 0.05) color = '#4ade80';
      else if (prevGap > 0.1 && timeGap > prevGap + 0.05) color = '#f87171';
      gtag.dataset.prev = String(timeGap);
      gtag.textContent = gapFmt(timeGap);
      gtag.style.left = `${x}px`;
      gtag.style.color = color;
      gtag.style.display = 'block';
    } else {
      gtag.style.display = 'none';
    }
  });
  document.getElementById('hud-clock').textContent = secFmt(state.elapsed);
  const leaderDist = positions.length ? Math.max(...positions.map(p => p.dist)) : 0;
  document.getElementById('hud-dist').innerHTML = `${Math.round(leaderDist)}m / <span>${state.totalDist}m</span>`;
  document.getElementById('hud-prog').style.width = (state.totalTime ? Math.min(state.elapsed / state.totalTime, 1) * 100 : 0) + '%';
  const leaderboardOrder = [...positions].sort((a,b) => b.dist - a.dist || a.time - b.time);
  const leaderTime = leaderboardOrder[0]?.time || 0;
  const lbBody = document.getElementById('lb-body');
  if (lbBody && !lbBody.parentElement.classList.contains('collapsed')) {
    lbBody.innerHTML = leaderboardOrder.map((p, rank) => {
      const athlete = state.athletes[p.idx];
      const posColor = rank===0?'#fbbf24':rank===1?'#a0aec0':rank===2?'#ed8936':'var(--text)';
      const gap = rank>0 ? gapFmt(p.time - leaderTime) : '';
      return `<div class="lb-row"><div class="lb-pos" style="color:${posColor}">${rank+1}</div><div class="lb-name" style="color:${p.color}">${shortName(p.name)} <span style="color:var(--text2)">${athlete.tag}</span></div><div class="lb-gap">${gap}</div><div class="lb-time">${secFmt(p.time)}</div></div>`;
    }).join('');
  }
  if (state.hoveredWaypoint != null && state.elapsed >= state.totalTime) renderWaypointTooltipAtDistance(state.hoveredWaypoint);
}
function hideWaypointTooltip() {
  const tooltip = document.getElementById('partial-tooltip');
  const line = document.getElementById('waypoint-hover-line');
  if (tooltip) tooltip.style.display = 'none';
  if (line) line.style.display = 'none';
  state.hoveredWaypoint = null;
}
function getNearestWaypointFromClientX(clientX) {
  if (state.elapsed < state.totalTime || !state.waypoints.length) return null;
  const pool = document.getElementById('pool');
  const rect = pool.getBoundingClientRect();
  const labelW = 30, rightPad = 200, trackW = rect.width - labelW - rightPad;
  const localX = clientX - rect.left, threshold = 12;
  let best = null;
  state.waypoints.forEach(dist => {
    const x = labelW + (dist / state.totalDist) * trackW;
    const delta = Math.abs(localX - x);
    if (delta <= threshold && (!best || delta < best.delta)) best = {dist, x, delta};
  });
  return best;
}
function renderWaypointTooltipAtDistance(dist) {
  const tooltip = document.getElementById('partial-tooltip');
  const line = document.getElementById('waypoint-hover-line');
  const pool = document.getElementById('pool');
  if (!tooltip || !line || !pool) return;
  const rect = pool.getBoundingClientRect();
  const labelW = 30, rightPad = 200, trackW = rect.width - labelW - rightPad;
  const x = labelW + (dist / state.totalDist) * trackW;
  const rows = state.athletes.map((athlete, idx) => {
    const time = athlete.distMap[dist];
    if (time == null) return null;
    let split = athlete.splitMap[dist];
    if (split == null) {
      const wps = athlete.wps.map(w => w.dist).sort((a,b) => a-b);
      const prevIdx = wps.filter(d => d < dist);
      if (prevIdx.length) {
        const prevDist = prevIdx[prevIdx.length - 1];
        const prevTime = athlete.distMap[prevDist];
        if (prevTime != null) split = time - prevTime;
      }
    }
    return {idx, athlete, time, split};
  }).filter(Boolean).sort((a,b) => a.time - b.time);
  if (!rows.length) { hideWaypointTooltip(); return; }
  const bestTime = rows[0].time;
  tooltip.innerHTML = `<div class="tt-head"><span class="tt-title">Parcial ${dist}m</span><span>${rows.length} atletas</span></div>` + rows.map((row, i) => {
    const gap = i > 0 ? gapFmt(row.time - bestTime) : '';
    const splitStr = row.split != null ? secFmt(row.split) : '';
    return `<div class="tt-row"><div class="tt-name" style="color:${row.athlete.color}">${i+1}. ${shortName(row.athlete.n)} <span style="color:var(--text2)">${row.athlete.tag}</span></div><div class="tt-time">${secFmt(row.time)}</div><div class="tt-split" style="min-width:42px">${splitStr}</div><div class="tt-split" style="min-width:48px;text-align:right">${gap}</div></div>`;
  }).join('');
  tooltip.style.display = 'block';
  line.style.display = 'block';
  line.style.left = `${x}px`;
  const ttWidth = tooltip.offsetWidth || 280;
  let left = x + 14;
  if (left + ttWidth > rect.width - 8) left = x - ttWidth - 14;
  if (left < 8) left = 8;
  tooltip.style.left = `${left}px`;
  tooltip.style.top = '10px';
}
function tick(timestamp) {
  if (!state.playing) return;
  if (!state.lastTs) state.lastTs = timestamp;
  const dtReal = (timestamp - state.lastTs) / 1000;
  state.lastTs = timestamp;
  state.elapsed += dtReal * state.speed;
  if (state.elapsed >= state.totalTime) {
    state.elapsed = state.totalTime;
    render();
    stop();
    return;
  }
  render();
  state.animId = requestAnimationFrame(tick);
}
function play() {
  if (state.elapsed >= state.totalTime) { state.elapsed = 0; state.lastTs = null; hideWaypointTooltip(); }
  state.playing = true;
  state.lastTs = null;
  document.getElementById('btn-play').textContent = '⏸ Pause';
  document.getElementById('btn-play').classList.add('playing');
  state.animId = requestAnimationFrame(tick);
}
function stop() {
  state.playing = false;
  if (state.animId) cancelAnimationFrame(state.animId);
  state.animId = null;
  document.getElementById('btn-play').textContent = '▶ Play';
  document.getElementById('btn-play').classList.remove('playing');
}
document.getElementById('btn-play').addEventListener('click', () => state.playing ? stop() : play());
document.getElementById('btn-reset').addEventListener('click', () => { stop(); state.elapsed = 0; state.lastTs = null; hideWaypointTooltip(); render(); });
document.getElementById('speed-slider').addEventListener('input', (e) => { state.speed = parseInt(e.target.value, 10) || 20; document.getElementById('speed-val').textContent = state.speed + '×'; });
selEv.addEventListener('change', () => setupRace(true));
selLimit.addEventListener('change', () => setupRace(false));
chkFinalA.addEventListener('change', () => setupRace(false));
chkFinalB.addEventListener('change', () => setupRace(false));
chkElimAll.addEventListener('change', () => { if (chkElimAll.checked) selElimSerie.value = ''; setupRace(false); });
selElimSerie.addEventListener('change', () => { if (selElimSerie.value) chkElimAll.checked = false; setupRace(false); });
selCategoria.addEventListener('change', () => setupRace(false));
document.getElementById('hud-prog-wrap').addEventListener('click', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  state.elapsed = ((e.clientX - rect.left) / rect.width) * state.totalTime;
  hideWaypointTooltip();
  rebuildTrail();
  render();
});
document.getElementById('btn-trail').addEventListener('click', () => {
  state.trailEnabled = !state.trailEnabled;
  document.getElementById('btn-trail').textContent = 'Trail: ' + (state.trailEnabled ? 'ON' : 'OFF');
  render();
});
window.addEventListener('resize', () => { state.LANE_H = window.innerWidth < 768 ? 36 : 44; sizeTrailCanvas(); rebuildTrail(); render(); });
document.getElementById('pool').addEventListener('mousemove', (e) => {
  if (state.playing || state.elapsed < state.totalTime) { hideWaypointTooltip(); return; }
  const near = getNearestWaypointFromClientX(e.clientX);
  if (!near) { hideWaypointTooltip(); return; }
  state.hoveredWaypoint = near.dist;
  renderWaypointTooltipAtDistance(near.dist);
});
document.getElementById('pool').addEventListener('mouseleave', () => hideWaypointTooltip());
(function() {
  const lb = document.getElementById('leaderboard');
  const handle = document.getElementById('lb-drag-handle');
  const toggle = document.getElementById('lb-toggle');
  let dragging = false, offX = 0, offY = 0;
  function startDrag(e) {
    if (e.target === toggle) return;
    dragging = true;
    const rect = lb.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    offX = clientX - rect.left; offY = clientY - rect.top; lb.style.transition = 'none'; e.preventDefault();
  }
  function onDrag(e) {
    if (!dragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    let newX = clientX - offX, newY = clientY - offY;
    newX = Math.max(0, Math.min(window.innerWidth - lb.offsetWidth, newX));
    newY = Math.max(0, Math.min(window.innerHeight - lb.offsetHeight, newY));
    lb.style.left = newX + 'px'; lb.style.top = newY + 'px'; lb.style.bottom = 'auto'; lb.style.right = 'auto'; e.preventDefault();
  }
  function endDrag() { dragging = false; lb.style.transition = ''; }
  handle.addEventListener('mousedown', startDrag);
  handle.addEventListener('touchstart', startDrag, {passive:false});
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('touchmove', onDrag, {passive:false});
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchend', endDrag);
  toggle.addEventListener('click', () => {
    const body = document.getElementById('lb-body');
    if (lb.classList.contains('collapsed')) { lb.classList.remove('collapsed'); body.style.display=''; toggle.textContent='—'; }
    else { lb.classList.add('collapsed'); body.style.display='none'; toggle.textContent='+'; }
  });
})();
setupRace(true);
</script>
