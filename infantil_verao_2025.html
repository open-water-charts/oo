<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Replay — CBDA Open 2025</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root {
  --bg: #060a14;
  --panel: #0c1221;
  --card: #111d33;
  --border: #1a2a4a;
  --text: #e2e8f0;
  --text2: #64748b;
  --accent: #38bdf8;
  --gold: #fbbf24;
  --silver: #a0aec0;
  --bronze: #ed8936;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

.header {
  background:linear-gradient(90deg, #0c1221 0%, #111d33 50%, #0c1221 100%);
  border-bottom:1px solid var(--border); padding:1rem 1.5rem;
  display:flex; align-items:center; gap:0.8rem;
}
.header h1 {
  font-size:1.15rem; font-weight:800; letter-spacing:-0.02em;
  background:linear-gradient(135deg,#38bdf8,#818cf8);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}

.controls {
  display:flex; flex-wrap:wrap; gap:0.6rem; align-items:center;
  padding:1rem 1.5rem; background:var(--panel); border-bottom:1px solid var(--border);
}
select {
  background:var(--card); color:var(--text); border:1px solid var(--border);
  padding:0.5rem 0.7rem; border-radius:8px; font-family:inherit; font-size:0.82rem;
  cursor:pointer; outline:none; max-width:380px;
}
select:focus { border-color:var(--accent); }

.btn {
  padding:0.5rem 1rem; border:none; border-radius:8px; font-family:inherit;
  font-weight:600; font-size:0.82rem; cursor:pointer; transition:all 0.15s;
}
.btn-play { background:var(--accent); color:#000; }
.btn-play:hover { filter:brightness(1.15); }
.btn-play.playing { background:#f87171; }
.btn-sec { background:var(--card); color:var(--text); border:1px solid var(--border); }
.btn-sec:hover { border-color:var(--accent); }

.speed-label { font-size:0.75rem; color:var(--text2); font-family:'JetBrains Mono',monospace; }

input[type="range"] {
  -webkit-appearance:none; background:var(--border); height:4px; border-radius:2px;
  outline:none; width:100px;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance:none; width:14px; height:14px; background:var(--accent);
  border-radius:50%; cursor:pointer;
}
.limit-wrap { display:flex; align-items:center; gap:0.4rem; }
.limit-wrap label { font-size:0.75rem; color:var(--text2); }

/* ===== HUD ===== */
.hud {
  display:flex; align-items:center; gap:1.5rem; padding:0.8rem 1.5rem;
  background:var(--panel); border-bottom:1px solid var(--border);
  font-family:'JetBrains Mono',monospace;
}
.hud-clock { font-size:1.6rem; font-weight:700; color:var(--accent); min-width:140px; }
.hud-dist { font-size:0.85rem; color:var(--text2); }
.hud-dist span { color:var(--text); font-weight:600; }
.hud-progress-wrap {
  flex:1; height:6px; background:var(--card); border-radius:3px; overflow:hidden;
  cursor:pointer; position:relative;
}
.hud-progress { height:100%; background:linear-gradient(90deg,var(--accent),#818cf8); border-radius:3px; transition:width 0.08s linear; }
.hud-progress-wrap .markers { position:absolute; top:0; left:0; width:100%; height:100%; }
.hud-progress-wrap .marker { position:absolute; top:-2px; width:1px; height:10px; background:rgba(255,255,255,0.15); }

/* ===== POOL ===== */
.pool-area { padding:0.5rem 1.5rem 1.5rem; }

.pool {
  position:relative;
  background:
    repeating-linear-gradient(90deg, transparent, transparent 49.8%, rgba(56,189,248,0.04) 49.8%, rgba(56,189,248,0.04) 50.2%, transparent 50.2%),
    linear-gradient(180deg, #071020 0%, #0a1628 100%);
  border:1px solid var(--border); border-radius:12px; overflow:hidden;
}

/* Lanes are now positional slots */
.lane-slot {
  position:relative; height:44px;
  border-bottom:1px solid rgba(56,189,248,0.06);
}
.lane-slot:nth-child(even) { background:rgba(255,255,255,0.008); }

/* Position number on left edge of each slot */
.slot-pos {
  position:absolute; left:6px; top:50%; transform:translateY(-50%);
  font-family:'JetBrains Mono',monospace; font-weight:700; font-size:0.7rem;
  color:var(--text2); z-index:5; width:18px; text-align:center;
}

/* Swimmer element: absolutely positioned within pool, NOT within a lane */
.swimmer-group {
  position:absolute; left:0; height:44px;
  display:flex; align-items:center;
  transition: top 250ms ease-in-out;
  z-index:20;
  pointer-events:none;
}
.swimmer-label {
  position:absolute; left:28px; top:50%; transform:translateY(-50%);
  display:flex; align-items:center; gap:0.3rem;
  font-size:0.78rem; font-weight:500;
  white-space:nowrap; z-index:10;
  background:linear-gradient(90deg, var(--panel) 60%, transparent 100%);
  padding:0 0.6rem 0 0.2rem;
  width:155px;
  overflow:hidden;
}
.swimmer-label .club { color:var(--text2); font-size:0.6rem; margin-left:auto; }

.swimmer-dot {
  position:absolute;
  width:14px; height:14px; border-radius:50%;
  top:50%; transform:translate(-50%,-50%);
  box-shadow:0 0 8px rgba(0,0,0,0.5);
}
.swimmer-dot::after {
  content:''; position:absolute; right:100%; top:50%; transform:translateY(-50%);
  width:30px; height:2px;
  background:linear-gradient(270deg, currentColor, transparent);
  opacity:0.4;
}

.swimmer-time {
  position:absolute; right:4px; top:50%; transform:translateY(-50%);
  font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--text2);
  z-index:10; background:rgba(6,10,20,0.7); padding:0.1rem 0.3rem; border-radius:3px;
}

/* Trail canvas */
.trail-canvas {
  position:absolute; top:0; left:0; width:100%; height:100%;
  z-index:15; pointer-events:none;
}

/* Distance markers */
.dist-markers { display:flex; height:20px; position:relative; margin-left:185px; margin-right:70px; }
.dist-marker { position:absolute; top:0; font-size:0.6rem; font-family:'JetBrains Mono',monospace; color:var(--text2); transform:translateX(-50%); }

/* ===== FLOATING LEADERBOARD ===== */
.leaderboard {
  position:fixed; bottom:20px; left:20px;
  background:rgba(12,18,33,0.94); border:1px solid var(--border);
  border-radius:10px; z-index:1000; font-size:0.72rem;
  min-width:210px; max-width:280px;
  backdrop-filter:blur(12px);
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  user-select:none;
}
.lb-header {
  display:flex; align-items:center; gap:0.4rem;
  padding:0.45rem 0.6rem;
  cursor:grab; border-bottom:1px solid var(--border);
  border-radius:10px 10px 0 0;
  background:rgba(255,255,255,0.02);
}
.lb-header:active { cursor:grabbing; }
.lb-grip { color:var(--text2); font-size:0.7rem; letter-spacing:2px; }
.lb-title { font-size:0.65rem; color:var(--text2); text-transform:uppercase; letter-spacing:0.06em; flex:1; }
.lb-close { color:var(--text2); cursor:pointer; font-size:0.9rem; line-height:1; padding:0 2px; }
.lb-close:hover { color:var(--text); }

.lb-body { padding:0.4rem 0.6rem; max-height:350px; overflow-y:auto; }
.lb-row { display:flex; gap:0.4rem; padding:0.15rem 0; align-items:center; }
.lb-pos { font-family:'JetBrains Mono',monospace; font-weight:700; width:20px; text-align:right; font-size:0.72rem; }
.lb-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lb-time { font-family:'JetBrains Mono',monospace; color:var(--text2); font-size:0.65rem; }
.lb-gap { font-family:'JetBrains Mono',monospace; color:#f87171; font-size:0.6rem; min-width:48px; text-align:right; }

@media (max-width:768px) {
  .swimmer-label { width:90px; font-size:0.65rem; }
  .dist-markers { margin-left:120px; }
  .lane-slot { height:36px; }
  .swimmer-group { height:36px; }
  .swimmer-dot { width:10px; height:10px; }
  .slot-pos { left:2px; font-size:0.6rem; }
  .leaderboard { min-width:170px; max-width:220px; bottom:10px; left:10px; }
}
</style>
</head>

,"t":"04:47.65","pa":{"50":"00:32.15","100":"01:07.73","150":"01:43.22","200":"02:19.88","250":"02:56.63","300":"03:33.66","350":"04:10.93","400":"04:47.65"}}];

const COLORS = ['#38bdf8','#f472b6','#fbbf24','#4ade80','#818cf8','#f87171','#fb923c','#a78bfa','#34d399','#e879f9',
  '#60a5fa','#fb7185','#facc15','#2dd4bf','#c084fc','#f97316','#a3e635','#67e8f9','#fda4af','#bef264'];

function timeToSec(t) {
  if (!t) return null;
  const p = t.replace(',','.').split(':');
  if (p.length===2) return parseFloat(p[0])*60 + parseFloat(p[1]);
  return parseFloat(p[0]);
}
function secFmt(s) {
  if (s==null||isNaN(s)) return '--:--.--';
  const m=Math.floor(s/60), sec=s%60;
  return `${String(m).padStart(2,'0')}:${sec.toFixed(2).padStart(5,'0')}`;
}
function gapFmt(s) {
  if (s <= 0) return '';
  return '+' + (s < 60 ? s.toFixed(2) : secFmt(s));
}

// Group by event
const EVENTS = {};
RAW.forEach(d => {
  if (!EVENTS[d.pn]) EVENTS[d.pn] = {pr:d.pr, dist:d.dist, athletes:[]};
  const wps = Object.entries(d.pa)
    .map(([dist, t]) => ({dist:parseInt(dist), t:timeToSec(t)}))
    .filter(w => w.t !== null)
    .sort((a,b) => a.dist - b.dist);
  if (wps.length < 2) return;
  EVENTS[d.pn].athletes.push({ name:d.n, club:d.e, col:d.c, cn:d.cn, finalTime:d.t, wps });
});
Object.values(EVENTS).forEach(ev => ev.athletes.sort((a,b) => (a.cn||999)-(b.cn||999)));

const selEv = document.getElementById('sel-event');
selEv.innerHTML = Object.entries(EVENTS)
  .sort(([a],[b]) => parseInt(a)-parseInt(b))
  .map(([pn,ev]) => `<option value="${pn}">${pn}ª ${ev.pr} (${ev.athletes.length})</option>`)
  .join('');

// ===== STATE =====
let state = {
  playing: false, elapsed: 0, speed: 20, animId: null, lastTs: null,
  athletes: [], totalDist: 0, totalTime: 0, waypoints: [],
  prevRanking: [], // previous frame ranking for debounce
  DEBOUNCE_M: 0.5,
  LANE_H: 44,
  trailEnabled: true,
  trailPrev: [], // {x, y} per athlete from last frame
  trailLerpY: [], // smoothed Y per athlete for diagonal trails
};

const speedSlider = document.getElementById('speed-slider');
const speedVal = document.getElementById('speed-val');
speedSlider.addEventListener('input', () => {
  state.speed = parseInt(speedSlider.value);
  speedVal.textContent = state.speed + '×';
});

// ===== SETUP =====
function setupRace() {
  stop();
  state.elapsed = 0; state.lastTs = null; state.prevRanking = [];
  
  const ev = EVENTS[parseInt(selEv.value)];
  if (!ev) return;
  
  const limit = parseInt(document.getElementById('sel-limit').value);
  const athletes = ev.athletes.slice(0, limit);
  
  state.totalDist = ev.dist;
  state.athletes = athletes.map((a,i) => ({
    ...a, color: COLORS[i % COLORS.length],
    segments: buildSegments(a.wps),
    origIdx: i,
  }));
  state.totalTime = Math.max(...state.athletes.map(a => a.wps[a.wps.length-1]?.t || 0));
  state.waypoints = [...new Set(athletes.flatMap(a => a.wps.map(w=>w.dist)))].sort((a,b)=>a-b);
  state.prevRanking = state.athletes.map((_,i) => i); // initial: original order
  
  // Adjust lane height for mobile
  state.LANE_H = window.innerWidth < 768 ? 36 : 44;
  
  buildPoolDOM();
  render();
}

function buildSegments(wps) {
  const segs = [];
  segs.push({sd:0, ed:wps[0].dist, st:0, et:wps[0].t});
  for (let i=1; i<wps.length; i++)
    segs.push({sd:wps[i-1].dist, ed:wps[i].dist, st:wps[i-1].t, et:wps[i].t});
  segs.forEach(s => s.v = (s.ed-s.sd)/(s.et-s.st||0.01));
  return segs;
}

function getPosition(athlete, elapsed) {
  const segs = athlete.segments;
  if (elapsed <= 0) return {dist:0, time:0};
  for (const seg of segs) {
    if (elapsed <= seg.et) {
      const frac = (elapsed - seg.st) / (seg.et - seg.st || 0.01);
      return {dist: seg.sd + frac * (seg.ed - seg.sd), time:elapsed};
    }
  }
  const last = segs[segs.length-1];
  return {dist:last.ed, time:last.et, finished:true};
}

// ===== DOM =====
function buildPoolDOM() {
  const pool = document.getElementById('pool');
  const distMarkers = document.getElementById('dist-markers');
  const hudMarkers = document.getElementById('hud-markers');
  
  const n = state.athletes.length;
  
  // Build lane slots (empty positional slots)
  pool.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const slot = document.createElement('div');
    slot.className = 'lane-slot';
    slot.innerHTML = `<div class="slot-pos">${i+1}º</div>`;
    pool.appendChild(slot);
  }
  
  // Trail canvas
  const canvas = document.createElement('canvas');
  canvas.className = 'trail-canvas';
  canvas.id = 'trail-canvas';
  pool.appendChild(canvas);
  
  // Build swimmer groups (absolute positioned, float between slots)
  state.athletes.forEach((a, i) => {
    const grp = document.createElement('div');
    grp.className = 'swimmer-group';
    grp.id = 'sg-' + i;
    grp.style.top = (i * state.LANE_H) + 'px';
    grp.style.width = '100%';
    grp.innerHTML = `
      <div class="swimmer-label">
        <span style="color:${a.color};font-weight:600;">${a.name.split(' ').slice(0,2).join(' ')}</span>
        <span class="club">${a.club}</span>
      </div>
      <div class="swimmer-dot" id="sd-${i}" style="background:${a.color};color:${a.color};left:185px;"></div>
      <div class="swimmer-time" id="st-${i}">--</div>
    `;
    pool.appendChild(grp);
  });
  
  // Distance markers
  const wps = state.waypoints;
  distMarkers.innerHTML = `<div class="dist-marker" style="left:0%">0m</div>` +
    wps.map(d => `<div class="dist-marker" style="left:${(d/state.totalDist)*100}%">${d}m</div>`).join('');
  
  hudMarkers.innerHTML = wps.map(d => `<div class="marker" style="left:${(d/state.totalDist)*100}%"></div>`).join('');
  
  // Size canvas to pool
  requestAnimationFrame(() => { sizeTrailCanvas(); });
  state.trailPrev = [];
  state.trailLerpY = [];
}

function sizeTrailCanvas() {
  const canvas = document.getElementById('trail-canvas');
  const pool = document.getElementById('pool');
  if (!canvas || !pool) return;
  canvas.width = pool.clientWidth;
  canvas.height = pool.clientHeight;
}

function clearTrail() {
  const canvas = document.getElementById('trail-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  state.trailPrev = [];
}

function drawTrailSegment(ctx, x1, y1, x2, y2, color) {
  ctx.strokeStyle = color;
  ctx.globalAlpha = 0.6;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.globalAlpha = 1.0;
}

// Rebuild trail from t=0 to t=elapsed (for scrub)
function rebuildTrail() {
  clearTrail();
  const canvas = document.getElementById('trail-canvas');
  if (!canvas || !state.trailEnabled) return;
  sizeTrailCanvas();
  const ctx = canvas.getContext('2d');
  const poolWidth = canvas.width;
  const labelW = 185, rightPad = 70;
  const trackW = poolWidth - labelW - rightPad;
  const n = state.athletes.length;
  
  // Step through time in small increments to rebuild the trail
  const dt = state.totalTime / 300; // ~300 steps for smooth trail
  let prevRanking = state.athletes.map((_,i) => i);
  let prevXY = state.athletes.map((_, i) => ({
    x: labelW,
    y: i * state.LANE_H + state.LANE_H / 2
  }));
  let lerpY = state.athletes.map((_, i) => i * state.LANE_H + state.LANE_H / 2);
  
  for (let t = dt; t <= state.elapsed; t += dt) {
    const positions = state.athletes.map((a, i) => {
      const pos = getPosition(a, t);
      return { idx:i, dist:pos.dist, time:pos.time };
    });
    
    // Rank
    const ranked = [...positions].sort((a,b) => b.dist - a.dist || a.time - b.time);
    const newOrder = ranked.map(r => r.idx);
    
    // Debounce
    let finalOrder = [...prevRanking];
    for (let rank = 0; rank < newOrder.length; rank++) {
      const shouldBe = newOrder[rank];
      const currentRank = finalOrder.indexOf(shouldBe);
      if (currentRank !== rank) {
        const gap = Math.abs(positions[shouldBe].dist - positions[finalOrder[rank]].dist);
        if (gap >= state.DEBOUNCE_M) {
          const displaced = finalOrder[rank];
          finalOrder[rank] = shouldBe;
          finalOrder[currentRank] = displaced;
        }
      }
    }
    prevRanking = finalOrder;
    
    // Compute x,y and draw segments
    finalOrder.forEach((athleteIdx, rank) => {
      const p = positions[athleteIdx];
      const pct = Math.min(p.dist / state.totalDist, 1);
      const x = labelW + pct * trackW;
      const y = rank * state.LANE_H + state.LANE_H / 2;
      const prev = prevXY[athleteIdx];
      if (prev) {
        // Lerp Y for smooth diagonals in rebuild
      if (lerpY[athleteIdx] == null) lerpY[athleteIdx] = y;
      else lerpY[athleteIdx] += (y - lerpY[athleteIdx]) * 0.18;
      const sy = lerpY[athleteIdx];
      drawTrailSegment(ctx, prev.x, prev.y, x, sy, state.athletes[athleteIdx].color);
      }
      prevXY[athleteIdx] = { x, y: lerpY[athleteIdx] != null ? lerpY[athleteIdx] : y };
    });
  }
  
  // Store final positions for subsequent render frames
  state.trailPrev = prevXY;
  state.trailLerpY = lerpY;
  state.prevRanking = prevRanking;
}

// ===== RENDER =====
function render() {
  const poolEl = document.getElementById('pool');
  if (!poolEl) return;
  const poolWidth = poolEl.clientWidth;
  const labelW = 185;
  const rightPad = 70;
  const trackW = poolWidth - labelW - rightPad;
  
  // Compute positions
  const positions = state.athletes.map((a, i) => {
    const pos = getPosition(a, state.elapsed);
    return {idx:i, dist:pos.dist, time:pos.time, finished:pos.finished,
            name:a.name, color:a.color, club:a.club};
  });
  
  // Rank by distance desc, time asc for ties
  const newRanked = [...positions].sort((a,b) => b.dist - a.dist || a.time - b.time);
  const newOrder = newRanked.map(r => r.idx);
  
  // Debounce: only swap if distance gap > DEBOUNCE_M
  let finalOrder;
  if (state.prevRanking.length === newOrder.length) {
    finalOrder = [...state.prevRanking];
    // Apply swaps from newOrder, but only if gap is sufficient
    for (let rank = 0; rank < newOrder.length; rank++) {
      const shouldBe = newOrder[rank];
      const currentRank = finalOrder.indexOf(shouldBe);
      if (currentRank !== rank) {
        // Check gap between the two swapping athletes
        const posA = positions[shouldBe];
        const posAtCurrent = positions[finalOrder[rank]];
        const gap = Math.abs(posA.dist - posAtCurrent.dist);
        if (gap >= state.DEBOUNCE_M) {
          // Swap
          const displaced = finalOrder[rank];
          finalOrder[rank] = shouldBe;
          finalOrder[currentRank] = displaced;
        }
      }
    }
  } else {
    finalOrder = newOrder;
  }
  state.prevRanking = finalOrder;
  
  // Position swimmers vertically by rank + draw trail
  const canvas = document.getElementById('trail-canvas');
  const ctx = canvas ? canvas.getContext('2d') : null;
  
  finalOrder.forEach((athleteIdx, rank) => {
    const grp = document.getElementById('sg-' + athleteIdx);
    const dot = document.getElementById('sd-' + athleteIdx);
    const timeLabel = document.getElementById('st-' + athleteIdx);
    if (!grp || !dot) return;
    
    const p = positions[athleteIdx];
    
    // Vertical: rank * lane height
    grp.style.top = (rank * state.LANE_H) + 'px';
    
    // Horizontal: distance proportion
    const pct = Math.min(p.dist / state.totalDist, 1);
    const xPx = labelW + pct * trackW;
    dot.style.left = xPx + 'px';
    
    timeLabel.textContent = secFmt(p.time);
    
    // Trail: draw line with lerp-smoothed Y for diagonal transitions
    if (state.trailEnabled && ctx) {
      const targetY = rank * state.LANE_H + state.LANE_H / 2;
      // Initialize or lerp
      if (state.trailLerpY[athleteIdx] == null) {
        state.trailLerpY[athleteIdx] = targetY;
      } else {
        state.trailLerpY[athleteIdx] += (targetY - state.trailLerpY[athleteIdx]) * 0.18;
      }
      const smoothY = state.trailLerpY[athleteIdx];
      if (state.trailPrev[athleteIdx]) {
        const prev = state.trailPrev[athleteIdx];
        drawTrailSegment(ctx, prev.x, prev.y, xPx, smoothY, state.athletes[athleteIdx].color);
      }
      state.trailPrev[athleteIdx] = { x: xPx, y: smoothY };
    }
  });
  
  // HUD
  document.getElementById('hud-clock').textContent = secFmt(state.elapsed);
  const leaderDist = Math.max(...positions.map(p=>p.dist));
  document.getElementById('hud-dist').innerHTML = `${Math.round(leaderDist)}m / <span>${state.totalDist}m</span>`;
  document.getElementById('hud-prog').style.width = (Math.min(state.elapsed/state.totalTime,1)*100)+'%';
  
  // Leaderboard
  const leaderTime = positions[finalOrder[0]]?.time || 0;
  const lbBody = document.getElementById('lb-body');
  if (lbBody && !lbBody.parentElement.classList.contains('collapsed')) {
    lbBody.innerHTML = finalOrder.map((idx, rank) => {
      const p = positions[idx];
      const posColor = rank===0?'#fbbf24':rank===1?'#a0aec0':rank===2?'#ed8936':'var(--text)';
      const gap = rank > 0 ? gapFmt(p.time - leaderTime) : '';
      return `<div class="lb-row">
        <div class="lb-pos" style="color:${posColor}">${rank+1}</div>
        <div class="lb-name" style="color:${p.color}">${p.name.split(' ').slice(0,2).join(' ')}</div>
        <div class="lb-gap">${gap}</div>
        <div class="lb-time">${secFmt(p.time)}</div>
      </div>`;
    }).join('');
  }
}

// ===== ANIMATION =====
function tick(timestamp) {
  if (!state.playing) return;
  if (!state.lastTs) state.lastTs = timestamp;
  const dtReal = (timestamp - state.lastTs) / 1000;
  state.lastTs = timestamp;
  state.elapsed += dtReal * state.speed;
  if (state.elapsed >= state.totalTime) {
    state.elapsed = state.totalTime; render(); stop(); return;
  }
  render();
  state.animId = requestAnimationFrame(tick);
}

function play() {
  if (state.elapsed >= state.totalTime) { state.elapsed = 0; state.lastTs = null; state.prevRanking = state.athletes.map((_,i)=>i); }
  state.playing = true; state.lastTs = null;
  document.getElementById('btn-play').textContent = '⏸ Pause';
  document.getElementById('btn-play').classList.add('playing');
  state.animId = requestAnimationFrame(tick);
}

function stop() {
  state.playing = false;
  if (state.animId) cancelAnimationFrame(state.animId);
  state.animId = null;
  document.getElementById('btn-play').textContent = '▶ Play';
  document.getElementById('btn-play').classList.remove('playing');
}

document.getElementById('btn-play').addEventListener('click', () => { state.playing ? stop() : play(); });
document.getElementById('btn-reset').addEventListener('click', () => {
  stop(); state.elapsed = 0; state.lastTs = null;
  state.prevRanking = state.athletes.map((_,i)=>i);
  clearTrail();
  render();
});
selEv.addEventListener('change', setupRace);
document.getElementById('sel-limit').addEventListener('change', setupRace);

// Scrub
document.getElementById('hud-prog-wrap').addEventListener('click', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  state.elapsed = ((e.clientX - rect.left) / rect.width) * state.totalTime;
  // Rebuild trail from scratch up to this point
  state.prevRanking = [];
  rebuildTrail();
  render();
});

window.addEventListener('resize', () => {
  state.LANE_H = window.innerWidth < 768 ? 36 : 44;
  sizeTrailCanvas();
  rebuildTrail();
  render();
});

// ===== DRAGGABLE LEADERBOARD =====
(function() {
  const lb = document.getElementById('leaderboard');
  const handle = document.getElementById('lb-drag-handle');
  const toggle = document.getElementById('lb-toggle');
  let dragging = false, offX = 0, offY = 0;
  
  function startDrag(e) {
    if (e.target === toggle) return; // don't drag when clicking minimize
    dragging = true;
    const rect = lb.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    offX = clientX - rect.left;
    offY = clientY - rect.top;
    lb.style.transition = 'none';
    e.preventDefault();
  }
  
  function onDrag(e) {
    if (!dragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    let newX = clientX - offX;
    let newY = clientY - offY;
    // Clamp to viewport
    newX = Math.max(0, Math.min(window.innerWidth - lb.offsetWidth, newX));
    newY = Math.max(0, Math.min(window.innerHeight - lb.offsetHeight, newY));
    lb.style.left = newX + 'px';
    lb.style.top = newY + 'px';
    lb.style.bottom = 'auto';
    lb.style.right = 'auto';
    e.preventDefault();
  }
  
  function endDrag() { dragging = false; lb.style.transition = ''; }
  
  handle.addEventListener('mousedown', startDrag);
  handle.addEventListener('touchstart', startDrag, {passive:false});
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('touchmove', onDrag, {passive:false});
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchend', endDrag);
  
  // Toggle collapse
  toggle.addEventListener('click', () => {
    const body = document.getElementById('lb-body');
    if (lb.classList.contains('collapsed')) {
      lb.classList.remove('collapsed');
      body.style.display = '';
      toggle.textContent = '—';
    } else {
      lb.classList.add('collapsed');
      body.style.display = 'none';
      toggle.textContent = '+';
    }
  });
})();

// Trail toggle
document.getElementById('btn-trail').addEventListener('click', () => {
  state.trailEnabled = !state.trailEnabled;
  document.getElementById('btn-trail').textContent = 'Trail: ' + (state.trailEnabled ? 'ON' : 'OFF');
  if (!state.trailEnabled) {
    clearTrail();
  } else {
    rebuildTrail();
  }
});

// Init
setupRace();
</script>
