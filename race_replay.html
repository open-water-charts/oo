<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAMPEONATO PARANAENSE DE INVERNO (INFANTIL/SÊNIOR) 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
:root {
  --bg:#06101d; --panel:#0b1728; --card:#0f1f35; --border:#173154; --text:#e5eefb; --text2:#7b93b8;
  --accent:#38bdf8; --accent2:#818cf8; --gold:#fbbf24; --silver:#a0aec0; --bronze:#ed8936;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.header { padding:16px 22px; border-bottom:1px solid var(--border); background:linear-gradient(90deg,#091324,#0e1d33,#091324); }
.header h1 { font-size:1.15rem; font-weight:800; letter-spacing:-.02em; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.controls { display:flex; flex-wrap:wrap; gap:10px 14px; align-items:center; padding:14px 20px; background:var(--panel); border-bottom:1px solid var(--border); }
select,input[type=range] { background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px 10px; font:inherit; }
.btn { padding:8px 14px; border-radius:8px; border:none; cursor:pointer; font:600 .88rem 'Outfit',sans-serif; }
.btn-play { background:var(--accent); color:#00111f; }
.btn-play.playing { background:#f87171; color:#190404; }
.btn-sec { background:var(--card); color:var(--text); border:1px solid var(--border); }
.filter-box { display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--card); border:1px solid var(--border); border-radius:10px; }
.filter-box label { display:flex; align-items:center; gap:5px; font-size:.82rem; white-space:nowrap; }
.filter-box select { padding:5px 8px; font-size:.82rem; }
.filter-title { color:var(--text2); font-size:.76rem; text-transform:uppercase; letter-spacing:.05em; }
.hud { display:flex; align-items:center; gap:16px; padding:12px 20px; background:var(--panel); border-bottom:1px solid var(--border); font-family:'JetBrains Mono',monospace; }
.hud-clock { min-width:160px; font-size:1.6rem; font-weight:700; color:var(--accent); }
.hud-dist { color:var(--text2); font-size:.88rem; }
.hud-dist span { color:var(--text); font-weight:600; }
.hud-progress-wrap { flex:1; height:7px; background:var(--card); border-radius:999px; overflow:hidden; cursor:pointer; position:relative; }
.hud-progress { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
.hud-progress-wrap .markers { position:absolute; inset:0; }
.hud-progress-wrap .marker { position:absolute; top:-2px; width:1px; height:11px; background:rgba(255,255,255,.14); }
.pool-area { padding:16px 20px 28px; }
.dist-markers { position:relative; margin-left:30px; margin-right:200px; height:22px; }
.dist-marker { position:absolute; top:0; transform:translateX(-50%); color:var(--text2); font:.7rem 'JetBrains Mono',monospace; }
.pool { position:relative; border:1px solid var(--border); border-radius:14px; overflow:hidden; background:
  linear-gradient(180deg,#081527 0%,#0a1a30 100%),
  repeating-linear-gradient(90deg,transparent,transparent 49.8%,rgba(56,189,248,.05) 49.8%,rgba(56,189,248,.05) 50.2%,transparent 50.2%);
}
.lane-slot { position:relative; height:44px; border-bottom:1px solid rgba(56,189,248,.08); }
.lane-slot:nth-child(even) { background:rgba(255,255,255,.01); }
.slot-pos { position:absolute; left:6px; top:50%; transform:translateY(-50%); width:20px; text-align:center; color:var(--text2); font:700 .72rem 'JetBrains Mono',monospace; }
.swimmer-group { position:absolute; left:0; width:100%; height:44px; pointer-events:none; }
.swimmer-label { position:absolute; right:4px; top:50%; transform:translateY(-50%); display:flex; align-items:center; gap:5px; white-space:nowrap; overflow:hidden; font-size:.72rem; background:rgba(6,12,22,.8); padding:2px 8px; border-radius:6px; max-width:200px; }
.swimmer-label .sname { font-weight:600; overflow:hidden; text-overflow:ellipsis; }
.swimmer-label .tag { font:700 .56rem 'JetBrains Mono',monospace; padding:1px 5px; border-radius:999px; background:rgba(255,255,255,.12); color:var(--text2); flex:0 0 auto; }
.swimmer-label .club { color:var(--text2); font-size:.58rem; overflow:hidden; text-overflow:ellipsis; }
.swimmer-capsule { position:absolute; height:22px; border-radius:11px; top:50%; transform:translate(-50%,-50%); box-shadow:0 0 10px rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; padding:0 7px; min-width:22px; }
.swimmer-capsule .initials { font:700 .6rem 'JetBrains Mono',monospace; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.5); letter-spacing:.5px; }
.swimmer-capsule::after { content:''; position:absolute; right:100%; top:50%; transform:translateY(-50%); width:28px; height:2px; background:linear-gradient(270deg,currentColor,transparent); opacity:.35; }
.gap-tag { position:absolute; top:1px; font:500 .48rem 'JetBrains Mono',monospace; color:rgba(255,255,255,.55); background:none; padding:0; white-space:nowrap; pointer-events:none; display:none; transform:translateX(-50%); }
.swimmer-time { display:none; }
.trail-canvas, .waypoint-hover-line { position:absolute; inset:0; pointer-events:none; }
.waypoint-hover-line { width:2px; left:0; background:rgba(255,255,255,.16); display:none; }
.leaderboard { position:fixed; left:20px; bottom:20px; min-width:230px; max-width:300px; z-index:1000; background:rgba(11,23,40,.94); border:1px solid var(--border); border-radius:12px; backdrop-filter:blur(12px); box-shadow:0 8px 26px rgba(0,0,0,.35); }
.lb-header { display:flex; align-items:center; gap:8px; padding:8px 10px; border-bottom:1px solid var(--border); background:rgba(255,255,255,.02); cursor:grab; }
.lb-header:active { cursor:grabbing; }
.lb-grip { color:var(--text2); letter-spacing:2px; }
.lb-title { flex:1; color:var(--text2); font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; }
.lb-close { cursor:pointer; color:var(--text2); font-size:1rem; line-height:1; }
.lb-body { padding:8px 10px; max-height:360px; overflow:auto; }
.lb-row { display:flex; align-items:center; gap:8px; padding:3px 0; font-size:.76rem; }
.lb-pos { width:22px; text-align:right; font:700 .74rem 'JetBrains Mono',monospace; }
.lb-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lb-gap, .lb-time { font:.64rem 'JetBrains Mono',monospace; color:var(--text2); }
.lb-gap { min-width:56px; text-align:right; color:#f87171; }
.partial-tooltip { position:absolute; top:10px; left:10px; min-width:270px; max-width:340px; padding:10px 12px; background:rgba(9,18,31,.96); border:1px solid var(--border); border-radius:12px; box-shadow:0 14px 32px rgba(0,0,0,.35); display:none; z-index:500; }
.tt-head { display:flex; justify-content:space-between; gap:12px; padding-bottom:8px; margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,.08); font-size:.75rem; color:var(--text2); }
.tt-title { color:var(--text); font-weight:700; }
.tt-row { display:grid; grid-template-columns:1fr auto auto auto; gap:8px; align-items:center; padding:3px 0; font-size:.76rem; }
.tt-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tt-time, .tt-split { font:.68rem 'JetBrains Mono',monospace; color:var(--text2); }
.empty-state { padding:22px; color:var(--text2); }
@media (max-width: 768px) {
  .lane-slot, .swimmer-group { height:36px; }
  .swimmer-label { max-width:130px; font-size:.6rem; }
  .swimmer-capsule { height:18px; border-radius:9px; padding:0 5px; min-width:18px; }
  .swimmer-capsule .initials { font-size:.52rem; }
  .dist-markers { margin-left:125px; }
  .leaderboard { left:10px; bottom:10px; min-width:180px; max-width:240px; }
}
</style>
</head>

}
function secFmt(s) {

  const h = Math.floor(s / 3600);

  const m = Math.floor(remainder / 60), sec = remainder % 60;
  if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${sec.toFixed(2).padStart(5, '0')}`;

  renderWaypointTooltipAtDistance(near.dist);
});
document.getElementById('pool').addEventListener('mouseleave', () => hideWaypointTooltip());
(function() {
  const lb = document.getElementById('leaderboard');
  const handle = document.getElementById('lb-drag-handle');
  const toggle = document.getElementById('lb-toggle');
  let dragging = false, offX = 0, offY = 0;
  function startDrag(e) {
    if (e.target === toggle) return;
    dragging = true;
    const rect = lb.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    offX = clientX - rect.left; offY = clientY - rect.top; lb.style.transition = 'none'; e.preventDefault();
  }
  function onDrag(e) {
    if (!dragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    let newX = clientX - offX, newY = clientY - offY;
    newX = Math.max(0, Math.min(window.innerWidth - lb.offsetWidth, newX));
    newY = Math.max(0, Math.min(window.innerHeight - lb.offsetHeight, newY));
    lb.style.left = newX + 'px'; lb.style.top = newY + 'px'; lb.style.bottom = 'auto'; lb.style.right = 'auto'; e.preventDefault();
  }
  function endDrag() { dragging = false; lb.style.transition = ''; }
  handle.addEventListener('mousedown', startDrag);
  handle.addEventListener('touchstart', startDrag, {passive:false});
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('touchmove', onDrag, {passive:false});
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchend', endDrag);
  toggle.addEventListener('click', () => {
    const body = document.getElementById('lb-body');
    if (lb.classList.contains('collapsed')) { lb.classList.remove('collapsed'); body.style.display=''; toggle.textContent='—'; }
    else { lb.classList.add('collapsed'); body.style.display='none'; toggle.textContent='+'; }
  });
})();
setupRace(true);
</script>
</body>
</html>
